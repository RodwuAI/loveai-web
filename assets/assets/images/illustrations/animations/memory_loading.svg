<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes flipPage {
        0% { transform: rotateY(0deg); opacity: 1; }
        50% { transform: rotateY(90deg); opacity: 0.5; }
        100% { transform: rotateY(0deg); opacity: 1; }
      }
      @keyframes pageFlip1 {
        0%, 100% { transform: translateX(0px) rotateY(0deg); }
        50% { transform: translateX(20px) rotateY(45deg); }
      }
      @keyframes pageFlip2 {
        0%, 100% { transform: translateX(0px) rotateY(0deg); }
        25% { transform: translateX(20px) rotateY(45deg); }
        75% { transform: translateX(20px) rotateY(45deg); }
      }
      .page1 { animation: pageFlip1 1.5s ease-in-out infinite; transform-origin: left center; }
      .page2 { animation: pageFlip2 1.5s ease-in-out infinite; transform-origin: left center; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" fill="#FFF8F6"/>

  <!-- Notebook back -->
  <rect x="40" y="60" width="120" height="100" rx="6" fill="#FFE5D4" stroke="#F59E8B" stroke-width="2"/>

  <!-- Page 1 (flipping) -->
  <g class="page1">
    <rect x="40" y="60" width="120" height="100" rx="6" fill="#FFFFFF" stroke="#F59E8B" stroke-width="1.5"/>
    <line x1="50" y1="75" x2="150" y2="75" stroke="#D4A5D4" stroke-width="1.5" opacity="0.5"/>
    <line x1="50" y1="85" x2="145" y2="85" stroke="#D4A5D4" stroke-width="1.5" opacity="0.5"/>
    <line x1="50" y1="95" x2="140" y2="95" stroke="#F59E8B" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- Spine (left binding) -->
  <rect x="40" y="60" width="5" height="100" fill="#F59E8B" opacity="0.7"/>

  <!-- Decorative pen -->
  <g>
    <line x1="155" y1="50" x2="165" y2="120" stroke="#D4A5D4" stroke-width="3" stroke-linecap="round"/>
    <circle cx="165" cy="125" r="2.5" fill="#3D3D3D"/>
  </g>

  <!-- Loading text or dots -->
  <g style="opacity: 0.7;">
    <circle cx="85" cy="175" r="2.5" fill="#F59E8B"/>
    <circle cx="100" cy="175" r="2.5" fill="#F59E8B"/>
    <circle cx="115" cy="175" r="2.5" fill="#F59E8B"/>
  </g>
</svg>
