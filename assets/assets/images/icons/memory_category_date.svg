<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
  <!-- Calendar body -->
  <rect x="6" y="10" width="36" height="32" rx="2" fill="#F59E8B" opacity="0.1" stroke="#F59E8B" stroke-width="1.5"/>

  <!-- Calendar header (month) -->
  <rect x="6" y="10" width="36" height="8" fill="#F59E8B" opacity="0.3" rx="2" rx-top="2"/>

  <!-- Month text placeholder -->
  <line x1="12" y1="12" x2="20" y2="12" stroke="#F59E8B" stroke-width="1.5" opacity="0.7"/>
  <line x1="28" y1="12" x2="36" y2="12" stroke="#F59E8B" stroke-width="1.5" opacity="0.7"/>

  <!-- Grid lines (calendar dates) -->
  <!-- Row 1 -->
  <line x1="6" y1="20" x2="42" y2="20" stroke="#D4A5D4" stroke-width="0.5" opacity="0.4"/>
  <line x1="18" y1="18" x2="18" y2="30" stroke="#D4A5D4" stroke-width="0.5" opacity="0.4"/>
  <line x1="30" y1="18" x2="30" y2="30" stroke="#D4A5D4" stroke-width="0.5" opacity="0.4"/>

  <!-- Date numbers -->
  <circle cx="12" cy="25" r="2.5" fill="#F59E8B" opacity="0.6"/>
  <circle cx="24" cy="25" r="2.5" fill="#F59E8B" opacity="0.4"/>
  <circle cx="36" cy="25" r="2.5" fill="#F59E8B" opacity="0.3"/>

  <!-- Row 2 -->
  <line x1="6" y1="32" x2="42" y2="32" stroke="#D4A5D4" stroke-width="0.5" opacity="0.4"/>
  <circle cx="12" cy="37" r="2" fill="#F59E8B" opacity="0.5"/>
  <circle cx="24" cy="37" r="2" fill="#F59E8B" opacity="0.3"/>
</svg>
