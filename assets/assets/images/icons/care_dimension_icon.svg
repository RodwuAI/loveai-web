<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .icon-group { opacity: 0.85; }
    </style>
  </defs>

  <!-- Central heart (representation of care) -->
  <path d="M 24 38
           C 24 38 12 28 12 18
           C 12 13 15 10 18 10
           C 20 10 22 11 24 12
           C 26 11 28 10 30 10
           C 33 10 36 13 36 18
           C 36 28 24 38 24 38"
        fill="#F59E8B"
        opacity="0.7"/>

  <!-- Small dimension icons around the heart -->
  <!-- Top: Phone/Message -->
  <circle class="icon-group" cx="24" cy="8" r="3" fill="#D4A5D4"/>
  <line x1="22" y1="7" x2="26" y2="7" stroke="#D4A5D4" stroke-width="1" opacity="0.8"/>

  <!-- Right: Gift -->
  <g class="icon-group" transform="translate(38, 20)">
    <rect x="-2" y="-2" width="4" height="4" fill="#F59E8B" opacity="0.6"/>
    <line x1="-2" y1="0" x2="2" y2="0" stroke="#F59E8B" stroke-width="0.5"/>
  </g>

  <!-- Bottom: Hug/Together -->
  <g class="icon-group" transform="translate(24, 42)">
    <path d="M -3 -1 Q -3 -3 -1 -3 Q 1 -3 1 -1" stroke="#D4A5D4" stroke-width="1" fill="none" stroke-linecap="round"/>
    <path d="M 3 -1 Q 3 -3 1 -3" stroke="#D4A5D4" stroke-width="1" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Left: Time/Clock -->
  <circle class="icon-group" cx="10" cy="20" r="2" fill="#F59E8B" opacity="0.6"/>
  <line x1="10" y1="18" x2="10" y2="20" stroke="#F59E8B" stroke-width="0.8" opacity="0.7"/>

  <!-- Center glow -->
  <circle cx="24" cy="24" r="16" fill="none" stroke="#F59E8B" stroke-width="0.5" opacity="0.15"/>
</svg>
