  <line x1="14" y1="12" x2="32" y2="12" stroke="#D4A5D4" stroke-width="1" opacity="0.6"/>
  <line x1="14" y1="17" x2="32" y2="17" stroke="#D4A5D4" stroke-width="1" opacity="0.6"/>
  <line x1="14" y1="22" x2="28" y2="22" stroke="#D4A5D4" stroke-width="1" opacity="0.5"/>

  <line x1="14" y1="28" x2="32" y2="28" stroke="#F59E8B" stroke-width="1" opacity="0.4"/>
  <line x1="14" y1="33" x2="32" y2="33" stroke="#F59E8B" stroke-width="1" opacity="0.4"/>
  <line x1="14" y1="38" x2="26" y2="38" stroke="#F59E8B" stroke-width="1" opacity="0.4"/>

