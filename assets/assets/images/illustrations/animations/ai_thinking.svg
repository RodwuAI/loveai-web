<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes pulse1 {
        0%, 100% { r: 6; opacity: 0.8; }
        50% { r: 8; opacity: 1; }
      }
      @keyframes pulse2 {
        0%, 100% { r: 5; opacity: 0.6; }
        50% { r: 7; opacity: 0.9; }
      }
      @keyframes pulse3 {
        0%, 100% { r: 5; opacity: 0.4; }
        50% { r: 7; opacity: 0.8; }
      }
      .dot1 { animation: pulse1 0.6s ease-in-out infinite; }
      .dot2 { animation: pulse2 0.6s ease-in-out infinite 0.15s; }
      .dot3 { animation: pulse3 0.6s ease-in-out infinite 0.3s; }
      .head {
        animation: float 2s ease-in-out infinite;
        transform-origin: 60px 50px;
      }
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-4px); }
      }
    </style>
  </defs>

  <!-- AI Head (heart-shaped) -->
  <g class="head">
    <path d="M 60 30
             C 60 30 40 20 30 30
             C 22 38 22 50 30 58
             L 60 80
             L 90 58
             C 98 50 98 38 90 30
             C 80 20 60 30 60 30"
          fill="#F59E8B" opacity="0.9"/>

    <!-- Eyes -->
    <circle cx="48" cy="45" r="3" fill="#3D3D3D"/>
    <circle cx="72" cy="45" r="3" fill="#3D3D3D"/>

    <!-- Smile -->
    <path d="M 50 58 Q 60 63 70 58"
          stroke="#D4A5D4" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Thinking dots (pulsing below the head) -->
  <circle class="dot1" cx="35" cy="100" r="6" fill="#F59E8B"/>
  <circle class="dot2" cx="60" cy="105" r="5" fill="#D4A5D4"/>
  <circle class="dot3" cx="85" cy="100" r="5" fill="#F59E8B"/>
</svg>
